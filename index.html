    min-height:100vh; padding:24px;
  }
  header { display:flex; justify-content:space-between; align-items:flex-start; flex-wrap:wrap; gap:12px; margin-bottom:20px; }
  h1 { font-size:24px; font-weight:800; letter-spacing:-.3px; }
  .sub { font-family:"SF Mono",Menlo,monospace; font-size:11px; color:#a89a8c; text-transform:uppercase; letter-spacing:1px; margin-top:6px; }
  .btn {
    background:#d98e4a; color:#1c1610; border:none; border-radius:10px;
    font-family:"SF Mono",Menlo,monospace; font-size:12px; font-weight:700;
    letter-spacing:.5px; padding:10px 18px; cursor:pointer; text-transform:uppercase;
  }
  .kpis { display:grid; grid-template-columns:repeat(auto-fit,minmax(140px,1fr)); gap:12px; margin-bottom:20px; }
  .kpi { background:#221c17; border:1px solid #332a22; border-radius:14px; padding:14px 16px; }
  .kpi .label { font-family:"SF Mono",Menlo,monospace; font-size:10px; letter-spacing:1px; text-transform:uppercase; color:#a89a8c; margin-bottom:8px; }
  .kpi .val { font-size:28px; font-weight:800; }
  .filters { display:flex; gap:8px; flex-wrap:wrap; margin-bottom:16px; }
  .chip {
    font-family:"SF Mono",Menlo,monospace; font-size:11px; letter-spacing:.5px;
    padding:7px 14px; border-radius:999px; border:1px solid #3a2f25;
    background:#221c17; color:#c9bcae; cursor:pointer; text-transform:uppercase;
  }
  .chip.active { background:#d98e4a; color:#1c1610; border-color:#d98e4a; font-weight:700; }
  .grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(340px,1fr)); gap:14px; }
  .card { background:#221c17; border:1px solid #332a22; border-radius:16px; padding:18px; display:flex; flex-direction:column; gap:10px; }
  .card.stale { outline:1px dashed #6b5335; }
  .card-top { display:flex; justify-content:space-between; align-items:center; gap:8px; }
  .cname { font-size:16px; font-weight:800; }
  .chan { font-family:"SF Mono",Menlo,monospace; font-size:10px; color:#8a7c6e; }
  .pill { font-family:"SF Mono",Menlo,monospace; font-size:10px; font-weight:700; letter-spacing:.5px; padding:5px 10px; border-radius:999px; text-transform:uppercase; white-space:nowrap; }
  .s-aprobado { background:#1e3524; color:#7fd898; }
  .s-esperando_cambios { background:#3d2320; color:#f2917e; }
  .s-esperando_cliente { background:#3b3117; color:#e8c765; }
  .s-en_produccion { background:#22303d; color:#7fb8e8; }
  .s-sin_actividad { background:#2b2b2b; color:#9a9a9a; }
  .sec { font-family:"SF Mono",Menlo,monospace; font-size:9px; letter-spacing:1.2px; text-transform:uppercase; color:#a08a6e; margin-bottom:3px; }
  .txt { font-size:13px; line-height:1.5; color:#ded4c8; }
  .blist { list-style:none; }
  .blist li { font-size:12.5px; line-height:1.45; color:#ded4c8; padding-left:18px; position:relative; margin-bottom:3px; }
  .blist.done li::before { content:"✓"; position:absolute; left:0; color:#7fd898; font-weight:700; }
  .blist.todo li::before { content:"○"; position:absolute; left:0; color:#e8c765; font-weight:700; }
  .meta { display:flex; justify-content:space-between; align-items:center; margin-top:auto; padding-top:8px; border-top:1px solid #2e261e; }
  .date { font-family:"SF Mono",Menlo,monospace; font-size:10px; color:#8a7c6e; }
  .warn { color:#f2917e; font-weight:700; }
  #statusline { font-family:"SF Mono",Menlo,monospace; font-size:11px; color:#a89a8c; margin-bottom:14px; min-height:16px; }

const STATUS_META = {
  aprobado:        {label:"Aprobado",          order:2},
  esperando_cambios:{label:"Esperando cambios", order:0},
  esperando_cliente:{label:"Esperando cliente", order:1},
  en_produccion:   {label:"En producción",     order:3},
  sin_actividad:   {label:"Sin actividad",     order:4}
};

let state = SNAPSHOT;
let filter = "todos";

function daysAgo(dateStr){
  if(!dateStr) return null;
  return Math.floor((Date.now() - new Date(dateStr+"T12:00:00").getTime()) / 86400000);
}
function bullets(arr, cls){
  if(!arr || !arr.length) return `<div class="txt">—</div>`;
  return `<ul class="blist ${cls}">` + arr.map(x=>`<li>${x}</li>`).join("") + `</ul>`;
}

function render(){
  const d = new Date(state.generated);
  document.getElementById("subline").textContent = state.clients.length + " clientes · snapshot del " + d.toLocaleString("es-MX",{dateStyle:"medium",timeStyle:"short"});

  const counts = {};
  state.clients.forEach(c => counts[c.status] = (counts[c.status]||0)+1);
  document.getElementById("kpis").innerHTML = Object.keys(STATUS_META).map(k =>
    `<div class="kpi"><div class="label">${STATUS_META[k].label}</div><div class="val">${counts[k]||0}</div></div>`
  ).join("");

  const filts = ["todos", ...Object.keys(STATUS_META)];
  document.getElementById("filters").innerHTML = filts.map(f =>
    `<button class="chip ${filter===f?'active':''}" onclick="setFilter('${f}')">${f==='todos'?'Todos':STATUS_META[f].label}</button>`
  ).join("");

  const list = state.clients
    .filter(c => filter==="todos" || c.status===filter)
    .slice()
    .sort((a,b) => (STATUS_META[a.status]?.order??9) - (STATUS_META[b.status]?.order??9) || String(b.last_activity||"").localeCompare(String(a.last_activity||"")));

  document.getElementById("grid").innerHTML = list.map(c => {
    const dago = daysAgo(c.last_activity);
    const staleTxt = dago===null ? "sin actividad" : (dago===0 ? "hoy" : dago+"d sin actividad");
    const stale = dago!==null && dago>=4;
    return `<div class="card ${stale?'stale':''}">
      <div class="card-top">
        <div><div class="cname">${c.client}</div><div class="chan">#${c.channel_name}</div></div>
        <span class="pill s-${c.status}">${STATUS_META[c.status]?.label || c.status}</span>
      </div>
      <div><div class="sec">Último acuerdo</div><div class="txt">${c.ultimo_acuerdo||"—"}</div></div>
      <div><div class="sec">Hecho</div>${bullets(c.hecho,"done")}</div>
      <div><div class="sec">Por entregar</div>${bullets(c.pendiente,"todo")}</div>
      <div class="meta">
        <span class="date ${stale?'warn':''}">${staleTxt}</span>
        <span class="date">${c.last_activity||""}</span>
      </div>
    </div>`;
  }).join("");
}
function setFilter(f){ filter=f; render(); }
render();
</script>
