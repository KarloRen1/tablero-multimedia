  const pct = Math.round(activas.length / cs.length * 100);
  const veredicto = atorados.length <= activas.length
    ? `Vamos bien: ${activas.length} de ${cs.length} clientes (${pct}%) con campaña activa o aprobada esta semana.`
    : `Ojo: hay más clientes atorados (${atorados.length}) que campañas activas (${activas.length}).`;
  const dtxt = c => { const d = daysAgo(c.last_activity); return d===null ? "sin fecha" : d+"d"; };
  const names = arr => arr.length
    ? `<div class="rnames">${arr.map(c=>`<span class="rname">${c.client} · ${dtxt(c)}</span>`).join("")}</div>`
    : `<div class="rnames"><span class="rname">ninguno</span></div>`;
  document.getElementById("resumen").innerHTML = `
    <div class="rbox ok"><div class="rlabel">¿Vamos bien?</div>
      <div class="rtxt">${veredicto} ${sinAct.length? sinAct.length+" sin actividad en 7 días.":""}</div></div>
    <div class="rbox stuck"><div class="rlabel">Atorados · esperando al cliente</div>
      <div class="rtxt">Bloqueados hasta que el cliente responda o apruebe:</div>${names(atorados)}</div>
    <div class="rbox live"><div class="rlabel">Campañas pro activas</div>
      <div class="rtxt">Ya en producción o con material aprobado:</div>${names(activas)}</div>`;
}

function render(){
  renderResumen();
  const d = new Date(state.generated);
  document.getElementById("subline").textContent = state.clients.length + " clientes · snapshot del " + d.toLocaleString("es-MX",{dateStyle:"medium",timeStyle:"short"});

  const counts = {};
  state.clients.forEach(c => counts[c.status] = (counts[c.status]||0)+1);
  document.getElementById("kpis").innerHTML = Object.keys(STATUS_META).map(k =>
    `<div class="kpi"><div class="label">${STATUS_META[k].label}</div><div class="val">${counts[k]||0}</div></div>`
  ).join("");

  const filts = ["todos", ...Object.keys(STATUS_META)];
  document.getElementById("filters").innerHTML = filts.map(f =>
    `<button class="chip ${filter===f?'active':''}" onclick="setFilter('${f}')">${f==='todos'?'Todos':STATUS_META[f].label}</button>`
  ).join("") + `<span style="width:1px;background:#3a2f25;margin:0 4px"></span>` + ["todas","Diana","Mavi"].map(f =>
    `<button class="chip ${csrFilter===f?'active':''}" onclick="setCsrFilter('${f}')">${f==='todas'?'CSR: Todas':f}</button>`
  ).join("");

  const list = state.clients
    .filter(c => (filter==="todos" || c.status===filter) && (csrFilter==="todas" || csrOf(c)===csrFilter))
    .slice()
    .sort((a,b) => (STATUS_META[a.status]?.order??9) - (STATUS_META[b.status]?.order??9) || String(b.last_activity||"").localeCompare(String(a.last_activity||"")));

  document.getElementById("grid").innerHTML = list.map(c => {
    const dago = daysAgo(c.last_activity);
    const staleTxt = dago===null ? "sin actividad" : (dago===0 ? "hoy" : dago+"d sin actividad");
    const stale = dago!==null && dago>=4;
    return `<div class="card ${stale?'stale':''}">
      <div class="card-top">
        <div><div class="cname">${c.client}</div><div class="chan">#${c.channel_name}</div></div>
        <div style="display:flex;flex-direction:column;gap:5px;align-items:flex-end">
          <span class="pill s-${c.status}">${STATUS_META[c.status]?.label || c.status}</span>
          <span class="csrpill csr-${csrOf(c)==='Diana'?'diana':csrOf(c)==='Mavi'?'mavi':'none'}">CSR \u00b7 ${csrOf(c)}</span>
        </div>
      </div>
      ${etapaBtn(c)}
      <div><div class="sec">Último acuerdo</div><div class="txt">${c.ultimo_acuerdo||"—"}</div></div>
      <div><div class="sec">Hecho</div>${bullets(c.hecho,"done")}</div>
      <div><div class="sec">Por entregar</div>${bullets(c.pendiente,"todo")}</div>
      <div class="meta">
        <span class="date ${stale?'warn':''}">${staleTxt}</span>
        <span class="date">${c.last_activity||""}</span>
      </div>
    </div>`;
  }).join("");
}
function setFilter(f){ filter=f; render(); }
function setCsrFilter(f){ csrFilter=f; render(); }
render();
</script>
</body>
</html>
